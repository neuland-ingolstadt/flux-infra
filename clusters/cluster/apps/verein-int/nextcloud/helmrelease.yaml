apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nextcloud
  namespace: verein-int
spec:
  interval: 24h
  url: https://nextcloud.github.io/helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: verein-int
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: verein-int
  valuesFrom:
    - kind: Secret
      name: nextcloud-secrets
      valuesKey: admin-password
      targetPath: nextcloud.password
    - kind: Secret
      name: nextcloud-secrets
      valuesKey: db-password
      targetPath: postgresql.global.postgresql.auth.password
    - kind: Secret
      name: nextcloud-secrets
      valuesKey: db-password
      targetPath: externalDatabase.password
    - kind: Secret
      name: nextcloud-secrets
      valuesKey: smtp-password
      targetPath: nextcloud.mail.smtp.password
    - kind: Secret
      name: nextcloud-secrets
      valuesKey: smtp-name
      targetPath: nextcloud.mail.smtp.name
  chart:
    spec:
      chart: nextcloud
      version: ">=8.0.0 <9.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: verein-int
      interval: 12h
  values:
    image:
      flavor: apache
      tag: 32.0.6

    replicaCount: 1

    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.middlewares: verein-int-nextcloud-hsts@kubernetescrd
      path: /
      pathType: Prefix
      tls:
        - hosts:
            - cloud.informatik.sexy
          secretName: cloud-informatik-sexy-tls

    nextcloud:
      host: cloud.informatik.sexy
      username: admin
      existingSecret:
        enabled: true
        secretName: nextcloud-secrets
        usernameKey: admin-username
        passwordKey: admin-password
        smtpUsernameKey: smtp-name
        smtpPasswordKey: smtp-password
        smtpHostKey: smtp-host

      mail:
        enabled: true
        fromAddress: DoNotReply
        domain: neuland-ingolstadt.de
        smtp:
          host: smtp.azurecomm.net
          secure: tls
          port: 587
          authtype: LOGIN

      objectStore:
        s3:
          enabled: true
          existingSecret: nextcloud-secrets
          secretKeys:
            accessKey: s3-access-key
            secretKey: s3-secret-key
          host: nbg1.your-objectstorage.com
          bucket: neuland-nextcloud
          port: 443
          ssl: true
          region: nbg1
          usePathStyle: true

      configs:
        custom.config.php: |-
          <?php
          $CONFIG = array (
            'instanceid' => getenv('NC_INSTANCEID'),
            'passwordsalt' => getenv('NC_PASSWORDSALT'),
            'secret' => getenv('NC_SECRET'),
            'overwrite.cli.url' => 'https://cloud.informatik.sexy',
            'overwriteprotocol' => 'https',
            'overwritehost' => 'cloud.informatik.sexy',
            'dbtableprefix' => 'oc_',
            'loglevel' => 2,
            'simpleSignUpLink.shown' => false,
            'trashbin_retention_obligation' => 'auto, 30',
            'app_install_overwrite' =>
            array (
              0 => 'groupfolders',
              1 => 'forms',
            ),
            'allow_local_remote_server' => true,
            'data-fingerprint' => 'af607fa0e28b3084573dbedbdbe48937',
            'maintenance_window_start' => 1,
          );

        oidc.config.php: |-
          <?php
          $CONFIG = array (
            'user_oidc' => array (
              'single_logout' => true,
              'auto_provision' => true,
              'soft_auto_provision' => true,
              'login_label' => 'Log in with Neuland SSO',
            ),
          );

        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' =>
            array (
              0 => '127.0.0.1',
              1 => '10.0.0.0/8',
              2 => '172.16.0.0/12',
            ),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
          );

      hooks:
        post-installation: |-
          echo "Disabling nextcloud-oidc-login (if present)..."
          php /var/www/html/occ app:disable oidc_login 2>/dev/null || true

          echo "Removing old oidc_login config keys..."
          php /var/www/html/occ config:system:delete hide_login_form 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_auto_redirect 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_provider_url 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_client_id 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_client_secret 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_logout_url 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_button_text 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_scope 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_end_session_redirect 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_auto_create 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_disable_registration 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_create_groups 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_attributes 2>/dev/null || true

          echo "Enabling official user_oidc app..."
          php /var/www/html/occ app:install user_oidc 2>/dev/null || true
          php /var/www/html/occ app:enable user_oidc

          echo "Registering OIDC provider..."
          php /var/www/html/occ user_oidc:provider "Neuland SSO" \
            --clientid="$OIDC_CLIENT_ID" \
            --clientsecret="$OIDC_CLIENT_SECRET" \
            --discoveryuri="https://auth.neuland.ing/application/o/cloud/.well-known/openid-configuration" \
            --mapping-uid="preferred_username" \
            --mapping-display-name="name" \
            --mapping-email="email" \
            --mapping-groups="groups" \
            --unique-uid=0 \
            --check-bearer=0 \
            --group-provisioning=0 \
            --scope="openid profile email"

          echo "Setting user_oidc as sole login backend..."
          php /var/www/html/occ config:app:set --type=string --value=0 user_oidc allow_multiple_user_backends
        before-starting: |-
          echo "Cleaning up old oidc_login config keys (if any)..."
          php /var/www/html/occ config:system:delete hide_login_form 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_auto_redirect 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_provider_url 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_client_id 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_client_secret 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_logout_url 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_button_text 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_scope 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_end_session_redirect 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_auto_create 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_disable_registration 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_create_groups 2>/dev/null || true
          php /var/www/html/occ config:system:delete oidc_login_attributes 2>/dev/null || true

          echo "Disabling old oidc_login app (if still present)..."
          php /var/www/html/occ app:disable oidc_login 2>/dev/null || true

          echo "Ensuring user_oidc provider is configured..."
          php /var/www/html/occ app:enable user_oidc 2>/dev/null || true

          PROVIDER_EXISTS=$(php /var/www/html/occ user_oidc:provider 2>/dev/null | grep -c "Neuland SSO" || true)
          if [ "$PROVIDER_EXISTS" = "0" ]; then
            echo "Re-registering OIDC provider..."
            php /var/www/html/occ user_oidc:provider "Neuland SSO" \
              --clientid="$OIDC_CLIENT_ID" \
              --clientsecret="$OIDC_CLIENT_SECRET" \
              --discoveryuri="https://auth.neuland.ing/application/o/cloud/.well-known/openid-configuration" \
              --mapping-uid="preferred_username" \
              --mapping-display-name="name" \
              --mapping-email="email" \
              --mapping-groups="groups" \
              --unique-uid=0 \
              --check-bearer=0 \
              --group-provisioning=0 \
              --scope="openid profile email"
            php /var/www/html/occ config:app:set --type=string --value=0 user_oidc allow_multiple_user_backends
          fi

          echo "Adding missing database indices..."
          php /var/www/html/occ db:add-missing-indices 2>/dev/null || true

          echo "Running MIME type migrations..."
          php /var/www/html/occ maintenance:repair --include-expensive 2>/dev/null || true

      extraEnv:
        - name: NC_INSTANCEID
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: nc-instanceid
        - name: NC_PASSWORDSALT
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: nc-passwordsalt
        - name: NC_SECRET
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: nc-secret
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: oidc-client-id
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: oidc-client-secret

      phpConfigs:
        zz-performance.ini: |-
          memory_limit=512M
          upload_max_filesize=16G
          post_max_size=16G
          max_execution_time=3600
          max_input_time=3600

    phpClientHttpsFix:
      enabled: true
      protocol: https

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-postgresql
      database: nextcloud
      user: nextcloud

    postgresql:
      enabled: true
      global:
        postgresql:
          auth:
            database: nextcloud
            username: nextcloud
      image:
        repository: bitnamilegacy/postgresql
        tag: 15.9.0-debian-12-r0
      primary:
        persistence:
          enabled: true
          size: 8Gi
          storageClass: longhorn

    redis:
      enabled: true
      image:
        repository: bitnamilegacy/redis
        tag: 8.0.1-debian-12-r1
      auth:
        enabled: false
      master:
        persistence:
          enabled: true
          size: 2Gi
          storageClass: longhorn
      replica:
        replicaCount: 0
        persistence:
          enabled: false

    cronjob:
      enabled: true
      type: sidecar

    persistence:
      enabled: true
      storageClass: longhorn
      size: 8Gi
      accessMode: ReadWriteOnce

    startupProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1

    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1

    readinessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
